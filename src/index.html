<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Context Gauge</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:transparent!important;
  overflow:hidden;
  user-select:none;-webkit-user-select:none;
}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="gauge"></canvas>
<script src="gauge.js"></script>
<script>
// Tauri bridge: listen for state updates
(function () {
  "use strict";
  var hasTauri = typeof window.__TAURI_INTERNALS__ !== "undefined";

  if (hasTauri) {
    var invoke = window.__TAURI_INTERNALS__.invoke;

    // Polling fallback (1000ms)
    setInterval(function () {
      invoke("get_state")
        .then(function (data) {
          if (data) {
            window.__gaugeRemaining = data.remaining || 100;
            window.__gaugeStatus    = data.status    || "idle";
          }
        })
        .catch(function () {});
    }, 1000);

    // Tauri event listener (primary)
    try {
      var tauriEvent = (window.__TAURI__ && window.__TAURI__.event)
        || (window.__TAURI_INTERNALS__ && window.__TAURI_INTERNALS__.event);
      if (tauriEvent) {
        tauriEvent.listen("state-changed", function (event) {
          var data = event.payload;
          window.__gaugeRemaining = data.remaining;
          window.__gaugeStatus    = data.status;
        });
      }
    } catch (e) {}
  }
})();
</script>
</body>
</html>
